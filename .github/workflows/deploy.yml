name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build
        env:
          PUBLIC_CONTACT_API_URL: ${{ vars.PUBLIC_CONTACT_API_URL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Hashed assets: content-addressed, safe to cache for 1 year
      - name: Sync hashed assets
        run: |
          aws s3 sync dist/_astro/ s3://${{ vars.SITE_BUCKET }}/_astro/ \
            --cache-control "public,max-age=31536000,immutable"

      # Everything else (HTML, sitemap, robots, images): short cache + delete stale files
      - name: Sync remaining files
        run: |
          aws s3 sync dist/ s3://${{ vars.SITE_BUCKET }}/ \
            --delete \
            --exclude "_astro/*" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.DISTRIBUTION_ID }} \
            --paths "/*"
